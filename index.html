<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Records Manager</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <!-- Dexie.js Library for local database storage -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #dcdde1;
        }


        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--primary);
        }


        .container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }


        h1 {
            margin: 0;
            font-size: 1.8rem;
            text-align: center;
        }


        /* Form using CSS Grid exclusively */
        .record-form {
            background: var(--surface);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }


        .form-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }


        .form-group.full-width {
            grid-column: span 2;
        }


        label {
            font-weight: 600;
            font-size: 0.9rem;
        }


        input {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
        }


        button {
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }


        button:hover {
            opacity: 0.9;
        }


        /* Grid Output Container */
        .data-table-header {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: var(--primary);
            color: white;
            padding: 12px;
            font-weight: bold;
            border-radius: 4px 4px 0 0;
            font-size: 0.9rem;
        }


        .data-list {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
        }


        .data-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }


        .data-row:last-child {
            border-bottom: none;
        }


        /* Mobile Screen Stack View */
        @media (max-width: 600px) {
            .record-form {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .data-table-header {
                display: none;
            }
            .data-row {
                grid-template-columns: 1fr;
                gap: 4px;
                padding: 16px;
            }
            .data-row div::before {
                content: attr(data-label) ": ";
                font-weight: bold;
            }
        }
    </style>
</head>
<body>


<div class="container">
    <h1>Records Manager</h1>


    <form id="employeeForm" class="record-form">
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required>
        </div>
        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required>
        </div>
        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
        </div>
        <div class="form-group">
            <label for="salary">Salary</label>
            <input type="number" id="salary" required>
        </div>
        <button type="submit" class="form-group full-width">Add Record</button>
    </form>


    <div>
        <div class="data-table-header">
            <div>First Name</div>
            <div>Last Name</div>
            <div>Date of Birth</div>
            <div>Salary</div>
        </div>
        <div id="dataList" class="data-list"></div>
    </div>
</div>


<script>
    // 1. Setup Local IndexedDB via Dexie
    const db = new Dexie("EmployeeDatabase");
    db.version(1).stores({
        employees: '++id, firstName, lastName, dob, salary'
    });


    const form = document.getElementById('employeeForm');
    const dataList = document.getElementById('dataList');


    // 2. Mock Data Seeding (Only runs if database is empty)
    async function seedDatabase() {
        const count = await db.employees.count();
        if (count === 0) {
            await db.employees.bulkAdd([
                { firstName: "Mike", lastName: "Jones", dob: "2023-01-01", salary: 10000 },
                { firstName: "Bob", lastName: "Sampson", dob: "1956-01-04", salary: 11000 },
                { firstName: "Susan", lastName: "Ho", dob: "1988-06-06", salary: 12000 },
                { firstName: "Cathy", lastName: "Coi", dob: "2026-09-08", salary: 13000 }
            ]);
        }
        renderRecords();
    }


    // 3. Render Data Rows
    async function renderRecords() {
        const records = await db.employees.toArray();
        dataList.innerHTML = '';
        
        records.forEach(record => {
            const row = document.createElement('div');
            row.className = 'data-row';
            
            const formattedSalary = new Intl.NumberFormat('en-US', {
                style: 'currency', currency: 'USD', maximumFractionDigits: 0
            }).format(record.salary);


            const dateObj = new Date(record.dob);
            // Accounts for time zone shift in raw date inputs
            const formattedDate = isNaN(dateObj) ? record.dob : new Date(dateObj.getTime() + dateObj.getTimezoneOffset() * 60000).toLocaleDateString('en-US');


            row.innerHTML = `
                <div data-label="First Name">${record.firstName}</div>
                <div data-label="Last Name">${record.lastName}</div>
                <div data-label="DOB">${formattedDate}</div>
                <div data-label="Salary">${formattedSalary}</div>
            `;
            dataList.appendChild(row);
        });
    }


    // 4. Form Submit
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        await db.employees.add({
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            dob: document.getElementById('dob').value,
            salary: parseInt(document.getElementById('salary').value, 10)
        });


        renderRecords();
        form.reset();
    });


    // 5. Register PWA Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }


    // Run app logic
    seedDatabase();
</script>
</body>
</html>
